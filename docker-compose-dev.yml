      retries: 5
      start_period: 15s

secrets:
  minio_access_key:
    file: ./.secrets/minio_access_key.txt
  minio_secret_key:
    file: ./.secrets/minio_secret_key.txt
  root_ca_cert:
    file: ./.secrets/pki/root-ca.crt
  worker_server_cert:
    file: ./.secrets/pki/worker-server.crt
  worker_server_key:
    file: ./.secrets/pki/worker-server.key
  worker_client_cert:
    file: ./.secrets/pki/worker-client.crt
  worker_client_key:
    file: ./.secrets/pki/worker-client.key

volumes:
  minio-data:
  prometheus-data:
  grafana-data:
  worker1-data:
  worker2-data:
  worker3-data:
