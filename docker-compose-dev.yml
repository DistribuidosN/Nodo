services:
  worker1:
    build:
      context: .
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: ["python", "-m", "worker.server"]
    environment:
      WORKER_NODE_ID: worker-1
      WORKER_BIND_HOST: 0.0.0.0
      WORKER_BIND_PORT: 50051
      WORKER_METRICS_HOST: 0.0.0.0
      WORKER_METRICS_PORT: 9101
      WORKER_HEALTH_HOST: 0.0.0.0
      WORKER_HEALTH_PORT: 8081
      WORKER_INPUT_DIR: /app/data/input
      WORKER_OUTPUT_DIR: /app/data/output
      WORKER_STATE_DIR: /app/data/state
      WORKER_OCR_COMMAND: '["python","scripts/backends/ocr_backend.py"]'
      WORKER_INFERENCE_COMMAND: '["python","scripts/backends/inference_backend.py"]'
      WORKER_GRPC_SERVER_CERT_FILE: /run/secrets/worker_server_cert
      WORKER_GRPC_SERVER_KEY_FILE: /run/secrets/worker_server_key
      WORKER_GRPC_SERVER_CLIENT_CA_FILE: /run/secrets/root_ca_cert
      WORKER_GRPC_SERVER_REQUIRE_CLIENT_AUTH: "true"
    ports:
      - "50051:50051"
      - "8081:8081"
      - "9101:9101"
    volumes:
      - worker1-data:/app/data
    secrets:
      - root_ca_cert
      - worker_server_cert
      - worker_server_key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "scripts/ops/healthcheck.py", "ready"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  worker2:
    build:
      context: .
    init: true
    restart: unless-stopped
    security_opt:
