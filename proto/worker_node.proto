syntax = "proto3";

package worker;

import "google/protobuf/timestamp.proto";

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_QUEUED = 1;
  TASK_STATUS_ADMITTED = 2;
  TASK_STATUS_RUNNING = 3;
  TASK_STATUS_RETRY_SCHEDULED = 4;
  TASK_STATUS_SUCCEEDED = 5;
  TASK_STATUS_FAILED = 6;
  TASK_STATUS_CANCELLED = 7;
  TASK_STATUS_REJECTED = 8;
}

enum NodeMode {
  NODE_MODE_UNSPECIFIED = 0;
  NODE_MODE_ACTIVE = 1;
  NODE_MODE_DRAINING = 2;
  NODE_MODE_SHUTTING_DOWN = 3;
}

enum OperationType {
  OPERATION_UNSPECIFIED = 0;
  OPERATION_GRAYSCALE = 1;
  OPERATION_RESIZE = 2;
  OPERATION_CROP = 3;
  OPERATION_ROTATE = 4;
  OPERATION_FLIP = 5;
  OPERATION_BLUR = 6;
  OPERATION_SHARPEN = 7;
  OPERATION_BRIGHTNESS_CONTRAST = 8;
  OPERATION_WATERMARK_TEXT = 9;
  OPERATION_FORMAT_CONVERSION = 10;
  OPERATION_OCR = 11;
  OPERATION_INFERENCE = 12;
}

enum ImageFormat {
  IMAGE_FORMAT_UNSPECIFIED = 0;
  IMAGE_FORMAT_JPG = 1;
  IMAGE_FORMAT_PNG = 2;
  IMAGE_FORMAT_TIF = 3;
}

message Transformation {
  OperationType type = 1;
  map<string, string> params = 2;
}

message InputImage {
  string image_id = 1;
  oneof source {
    bytes content = 2;
    string input_path = 3;
    string input_uri = 4;
  }
  ImageFormat format = 5;
  uint64 size_bytes = 6;
  uint32 width = 7;
  uint32 height = 8;
}

message Task {
  string task_id = 1;
  string idempotency_key = 2;
  int32 priority = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp deadline = 5;
  uint32 max_retries = 6;
  repeated Transformation transforms = 7;
  InputImage input = 8;
  ImageFormat output_format = 9;
  map<string, string> metadata = 10;
}

message SubmitTaskRequest {
  Task task = 1;
}

message SubmitTaskReply {
  bool accepted = 1;
  bool duplicate = 2;
  string task_id = 3;
  TaskStatus status = 4;
  uint32 queue_position = 5;
  string reason = 6;
}

message GetNodeStatusRequest {}

message NodeStatus {
  string node_id = 1;
  NodeMode mode = 2;
  bool accepting_tasks = 3;
  uint32 queue_length = 4;
  uint32 active_tasks = 5;
  uint32 capacity_effective = 6;
  double cpu_utilization = 7;
  double memory_utilization = 8;
  double gpu_utilization = 9;
  double io_utilization = 10;
  uint64 available_memory_bytes = 11;
  uint64 reserved_memory_bytes = 12;
  google.protobuf.Timestamp timestamp = 13;
}

message CancelTaskRequest {
  string task_id = 1;
  string reason = 2;
}

message CancelTaskReply {
  bool accepted = 1;
  TaskStatus status = 2;
  string message = 3;
}

message DrainNodeRequest {
  bool reject_new_tasks = 1;
}

message DrainNodeReply {
  bool accepted = 1;
  string message = 2;
}

message ShutdownNodeRequest {
  uint32 grace_period_seconds = 1;
}

message ShutdownNodeReply {
  bool accepted = 1;
  string message = 2;
}

message ProgressEvent {
  string task_id = 1;
  string image_id = 2;
  string node_id = 3;
  TaskStatus status = 4;
  uint32 progress_pct = 5;
  uint32 attempt = 6;
  uint64 queue_wait_ms = 7;
  uint64 run_time_ms = 8;
  string message = 9;
  google.protobuf.Timestamp timestamp = 10;
  map<string, string> metadata = 11;
}

message ExecutionResult {
  string task_id = 1;
  string image_id = 2;
  string node_id = 3;
  TaskStatus status = 4;
  uint32 attempt = 5;
  string output_path = 6;
  ImageFormat output_format = 7;
  uint32 width = 8;
  uint32 height = 9;
  uint64 size_bytes = 10;
  string error_code = 11;
  string error_message = 12;
  google.protobuf.Timestamp started_at = 13;
  google.protobuf.Timestamp finished_at = 14;
  map<string, string> metadata = 15;
}

message ReportAck {
  bool accepted = 1;
  string message = 2;
}

message HeartbeatRequest {
  NodeStatus status = 1;
}

message HeartbeatReply {
  bool accepted = 1;
  string message = 2;
  google.protobuf.Timestamp coordinator_time = 3;
}

service WorkerControlService {
  rpc SubmitTask(SubmitTaskRequest) returns (SubmitTaskReply);
  rpc GetNodeStatus(GetNodeStatusRequest) returns (NodeStatus);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskReply);
  rpc DrainNode(DrainNodeRequest) returns (DrainNodeReply);
  rpc ShutdownNode(ShutdownNodeRequest) returns (ShutdownNodeReply);
}

service CoordinatorCallbackService {
  rpc ReportProgress(ProgressEvent) returns (ReportAck);
  rpc ReportResult(ExecutionResult) returns (ReportAck);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatReply);
}
