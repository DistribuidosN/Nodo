syntax = "proto3";

package imagenode;

option java_multiple_files = true;
option java_package = "com.upb.imagenode.grpc";
option java_outer_classname = "ImageNodeProto";

service ImageNodeService {
  rpc ProcessToPath(ProcessRequest) returns (PathResponse);
  rpc ProcessToData(ProcessRequest) returns (DataResponse);
  rpc HealthCheck(EmptyRequest) returns (HealthCheckResponse);
  rpc GetMetrics(EmptyRequest) returns (MetricsResponse);
  rpc UploadLargeImage(stream ImageChunk) returns (DataResponse);
  rpc StreamBatchProcess(stream ProcessRequest) returns (stream DataResponse);
  rpc GetProcessedFilePaths(EmptyRequest) returns (PathListResponse);
  rpc FindPathByName(FileNameRequest) returns (PathResponse);
  rpc GetProcessedImages(EmptyRequest) returns (DataListResponse);
  rpc FindImageByName(FileNameRequest) returns (DataResponse);
  rpc ProcessBatch(BatchRequest) returns (BatchDataResponse);
}

message EmptyRequest {}

message FileNameRequest {
  string file_name = 1;
}

message ProcessRequest {
  bytes image_data = 1;
  string file_name = 2;
  repeated string filters = 3;
}

message ImageChunk {
  bytes chunk_data = 1;
  string file_name = 2;
  repeated string filters = 3;
}

message PathResponse {
  string result_path = 1;
  bool success = 2;
  string message = 3;
}

message DataResponse {
  bytes image_data = 1;
  bool success = 2;
  string file_name = 3;
  string result_path = 4;
  string message = 5;
}

message HealthCheckResponse {
  bool is_alive = 1;
  bool is_ready = 2;
  string node_id = 3;
  string message = 4;
}

message MetricsResponse {
  map<string, float> statistics = 1;
}

message PathListResponse {
  repeated string paths = 1;
}

message DataListResponse {
  repeated bytes images = 1;
}

message BatchRequest {
  repeated ProcessRequest requests = 1;
}

message BatchDataResponse {
  repeated DataResponse responses = 1;
  bool all_success = 2;
}
