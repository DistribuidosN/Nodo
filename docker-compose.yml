# SINGLE WORKER PRODUCTION DEPLOYMENT
# For development with multiple workers, use: docker-compose-dev.yml
# 
# This minimal setup runs a single worker with no external dependencies.
# Use for production deployment where:
# - Each worker runs independently on its own machine/VM
# - Java backend server handles coordination, metrics collection, etc.

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Environment variables below are DEFAULTS.
    # Override them when running the container to match your production setup.
    environment:
      # === REQUIRED CONFIG ===
      WORKER_NODE_ID: ${WORKER_NODE_ID:-worker-production}
      WORKER_BIND_HOST: ${WORKER_BIND_HOST:-0.0.0.0}
      WORKER_BIND_PORT: ${WORKER_BIND_PORT:-50051}
      
      # === OPTIONAL: Java Backend Server Callback ===
      # Leave empty if your Java backend doesn't have a gRPC callback service
      # Set to "java-server:50052" if Java backend listens on a different machine
      WORKER_COORDINATOR_TARGET: ${WORKER_COORDINATOR_TARGET:-}
      
      # === OPTIONAL: Metrics Export ===
      # Disable (set to 0) if you don't expose the metrics endpoint
      WORKER_METRICS_HOST: ${WORKER_METRICS_HOST:-0.0.0.0}
      WORKER_METRICS_PORT: ${WORKER_METRICS_PORT:-9100}
      
      # === OPTIONAL: Health Checks ===
      # Disable (set to 0) if your orchestrator doesn't use HTTP health probes
      WORKER_HEALTH_HOST: ${WORKER_HEALTH_HOST:-0.0.0.0}
      WORKER_HEALTH_PORT: ${WORKER_HEALTH_PORT:-8081}
      
      # === STORAGE (Use local disk by default) ===
      WORKER_INPUT_DIR: ${WORKER_INPUT_DIR:-/app/data/input}
      WORKER_OUTPUT_DIR: ${WORKER_OUTPUT_DIR:-/app/data/output}
      WORKER_STATE_DIR: ${WORKER_STATE_DIR:-/app/data/state}
      
      # === IMAGE PROCESSING BACKENDS ===
      WORKER_OCR_COMMAND: ${WORKER_OCR_COMMAND:-["python","scripts/backends/ocr_backend.py"]}
      WORKER_INFERENCE_COMMAND: ${WORKER_INFERENCE_COMMAND:-["python","scripts/backends/inference_backend.py"]}
      
      # === OPTIONAL: TLS Configuration ===
      # For production, use TLS. Set these to your certificate paths.
      # WORKER_GRPC_SERVER_CERT_FILE: /etc/worker/certs/server.crt
      # WORKER_GRPC_SERVER_KEY_FILE: /etc/worker/certs/server.key
      # WORKER_GRPC_SERVER_CLIENT_CA_FILE: /etc/worker/certs/ca.crt (if mTLS required)
      # WORKER_GRPC_SERVER_REQUIRE_CLIENT_AUTH: "false"
      
      # === OPTIONAL: Java Backend TLS ===
      # If your Java backend uses TLS, configure:
      # WORKER_COORDINATOR_CA_FILE: /etc/worker/certs/java-ca.crt
      # WORKER_COORDINATOR_CLIENT_CERT_FILE: /etc/worker/certs/client.crt
      # WORKER_COORDINATOR_CLIENT_KEY_FILE: /etc/worker/certs/client.key
      
      WORKER_LOG_LEVEL: ${WORKER_LOG_LEVEL:-INFO}
    
    ports:
      - "${WORKER_BIND_PORT:-50051}:${WORKER_BIND_PORT:-50051}"
      - "${WORKER_HEALTH_PORT:-8081}:${WORKER_HEALTH_PORT:-8081}"
      - "${WORKER_METRICS_PORT:-9100}:${WORKER_METRICS_PORT:-9100}"
    
    volumes:
      - worker-data:/app/data                       # Persistent storage for input, outputs and state
      # Uncomment to mount certificates:
      # - /etc/worker/certs:/etc/worker/certs:ro
    
    healthcheck:
      test: ["CMD", "python", "scripts/ops/healthcheck.py", "ready"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

volumes:
  worker-data:
