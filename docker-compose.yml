secrets:
  minio_access_key:
    file: ./.secrets/minio_access_key.txt
  minio_secret_key:
    file: ./.secrets/minio_secret_key.txt
  root_ca_cert:
    file: ./.secrets/pki/root-ca.crt
  coordinator_server_cert:
    file: ./.secrets/pki/coordinator-server.crt
  coordinator_server_key:
    file: ./.secrets/pki/coordinator-server.key
  coordinator_client_cert:
    file: ./.secrets/pki/coordinator-client.crt
  coordinator_client_key:
    file: ./.secrets/pki/coordinator-client.key
  worker_server_cert:
    file: ./.secrets/pki/worker-server.crt
  worker_server_key:
    file: ./.secrets/pki/worker-server.key
  worker_client_cert:
    file: ./.secrets/pki/worker-client.crt
  worker_client_key:
    file: ./.secrets/pki/worker-client.key

volumes:
  redis-data:
  minio-data:
  worker1-data:
  worker2-data:
  worker3-data:
