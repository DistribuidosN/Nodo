         python -m worker"
      ]
    environment:
      WORKER_NODE_ID: worker-2
      WORKER_BIND_HOST: 0.0.0.0
      WORKER_BIND_PORT: 50051
      WORKER_COORDINATOR_TARGET: coordinator-lb:50052
      WORKER_METRICS_HOST: 0.0.0.0
      WORKER_METRICS_PORT: 9102
      WORKER_HEALTH_HOST: 0.0.0.0
      WORKER_HEALTH_PORT: 8082
      WORKER_OUTPUT_DIR: /app/data/out
      WORKER_STATE_DIR: /app/data/state
      WORKER_OUTPUT_URI_PREFIX: s3://distributed-output/worker-2
      WORKER_STATE_URI_PREFIX: s3://distributed-state/workers
      WORKER_REQUIRE_SHARED_STORAGE: "true"
      WORKER_STORAGE_ENDPOINT_URL: http://minio:9000
      WORKER_STORAGE_REGION: us-east-1
      WORKER_STORAGE_FORCE_PATH_STYLE: "true"
      WORKER_OCR_COMMAND: '["python","scripts/ocr_backend.py"]'
      WORKER_INFERENCE_COMMAND: '["python","scripts/inference_backend.py"]'
      WORKER_GRPC_SERVER_CERT_FILE: /run/secrets/worker_server_cert
      WORKER_GRPC_SERVER_KEY_FILE: /run/secrets/worker_server_key
      WORKER_GRPC_SERVER_CLIENT_CA_FILE: /run/secrets/root_ca_cert
      WORKER_GRPC_SERVER_REQUIRE_CLIENT_AUTH: "true"
      WORKER_COORDINATOR_CA_FILE: /run/secrets/root_ca_cert
      WORKER_COORDINATOR_CLIENT_CERT_FILE: /run/secrets/worker_client_cert
      WORKER_COORDINATOR_CLIENT_KEY_FILE: /run/secrets/worker_client_key
      WORKER_COORDINATOR_SERVER_NAME_OVERRIDE: coordinator.service
    ports:
      - "50061:50051"
      - "8082:8082"
      - "9102:9102"
    volumes:
      - worker2-data:/app/data
    secrets:
      - minio_access_key
      - minio_secret_key
      - root_ca_cert
      - worker_server_cert
      - worker_server_key
      - worker_client_cert
      - worker_client_key
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py", "ready"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  worker3:
    build:
      context: .
    depends_on:
      coordinator-lb:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command:
      [
        "/bin/sh",
        "-lc",
        "export WORKER_STORAGE_ACCESS_KEY_ID=$(cat /run/secrets/minio_access_key) &&
         export WORKER_STORAGE_SECRET_ACCESS_KEY=$(cat /run/secrets/minio_secret_key) &&
         python -m worker"
      ]
    environment:
      WORKER_NODE_ID: worker-3
      WORKER_BIND_HOST: 0.0.0.0
      WORKER_BIND_PORT: 50051
      WORKER_COORDINATOR_TARGET: coordinator-lb:50052
      WORKER_METRICS_HOST: 0.0.0.0
      WORKER_METRICS_PORT: 9103
      WORKER_HEALTH_HOST: 0.0.0.0
      WORKER_HEALTH_PORT: 8083
      WORKER_OUTPUT_DIR: /app/data/out
      WORKER_STATE_DIR: /app/data/state
      WORKER_OUTPUT_URI_PREFIX: s3://distributed-output/worker-3
      WORKER_STATE_URI_PREFIX: s3://distributed-state/workers
      WORKER_REQUIRE_SHARED_STORAGE: "true"
      WORKER_STORAGE_ENDPOINT_URL: http://minio:9000
      WORKER_STORAGE_REGION: us-east-1
      WORKER_STORAGE_FORCE_PATH_STYLE: "true"
      WORKER_OCR_COMMAND: '["python","scripts/ocr_backend.py"]'
      WORKER_INFERENCE_COMMAND: '["python","scripts/inference_backend.py"]'
      WORKER_GRPC_SERVER_CERT_FILE: /run/secrets/worker_server_cert
      WORKER_GRPC_SERVER_KEY_FILE: /run/secrets/worker_server_key
      WORKER_GRPC_SERVER_CLIENT_CA_FILE: /run/secrets/root_ca_cert
      WORKER_GRPC_SERVER_REQUIRE_CLIENT_AUTH: "true"
      WORKER_COORDINATOR_CA_FILE: /run/secrets/root_ca_cert
      WORKER_COORDINATOR_CLIENT_CERT_FILE: /run/secrets/worker_client_cert
      WORKER_COORDINATOR_CLIENT_KEY_FILE: /run/secrets/worker_client_key
      WORKER_COORDINATOR_SERVER_NAME_OVERRIDE: coordinator.service
    ports:
